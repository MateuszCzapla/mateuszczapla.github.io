<div class="container">
    <nav class="row">
        <div class="nav-wrapper">
            <span class="brand-logo center">
                <h4>{{username}}</h4>
            </span>
        </div>
    </nav>
</div>
<h6>Liczba elementów: {{itemCount}}</h6>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Zadanie</th>
            <th>Wykonane</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let item of items; let i = index">
            <td>{{i+1}}</td>
            <td>{{item.task}}</td>
            <td><input type="button" [(ngModel)] = "item.complete"></td>
            <td [ngSwitch]="item.complete">
                <span *ngSwitchCase="true">TAK</span>
                <span *ngSwitchDefault>NIE</span> 
            </td>
        </tr>
    </tbody>
</table>
